<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarilo LLC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fff;
      padding: 2rem 1.25rem;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .last-updated {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
    }
    h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }
    p {
      margin-bottom: 1rem;
    }
    ul {
      margin: 0.5rem 0 1rem 1.5rem;
    }
    ul li {
      margin-bottom: 0.5rem;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .contact-block {
      margin-top: 0.5rem;
      line-height: 1.9;
    }
  </style>
</head>
<body>
  <main>
    <h1>Privacy Policy</h1>
  </main>
</body>
</html>
